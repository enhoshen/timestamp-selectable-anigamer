<!DOCTYPE html>
<html>
<head>
  <title>Video Time Control</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 200px;
      padding: 10px;
      text-align: center;
      background-color: #222;
      color: white;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      width: 100%;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
    button:active {
      background-color: #004085;
    }
  </style>
</head>
<body>
  <h2>Video Time</h2>
  <button id="toggleWindowButton">Toggle Floating Window</button>
  <script src="popup.js"></script>
</body>
</html>
